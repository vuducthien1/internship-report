AWSTemplateFormatVersion: '2010-09-09'
Description: Production AWS infrastructure for Voice-Driven Construction Management System.

Parameters:
  EnvironmentName:
    Type: String
    Default: vdcms-prod
    AllowedPattern: '[a-z0-9-]+'
  RepositoryUrl:
    Type: String
    Description: HTTPS Git repository URL that EC2 can clone.
  RepositoryBranch:
    Type: String
    Default: main
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
  BackendDesiredCapacity:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 1
    Description: Keep at one until Socket.IO uses a shared Redis adapter.
  DatabaseName:
    Type: String
    Default: smartconstruction
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
  DatabaseInstanceClass:
    Type: String
    Default: db.t3.micro
  DatabaseAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
  DatabaseMultiAZ:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  DatabaseDeletionProtection:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  BootstrapAdminUsername:
    Type: String
    Default: vdcmsadmin
    MinLength: 5
  BootstrapAdminEmail:
    Type: String
    Description: Email address for the first local Admin account.
  SesFromEmail:
    Type: String
    Default: ''
    Description: Verified Amazon SES sender; leave blank to use the local outbox fallback.

Conditions:
  UseMultiAZ: !Equals [!Ref DatabaseMultiAZ, 'true']
  ProtectDatabase: !Equals [!Ref DatabaseDeletionProtection, 'true']

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.40.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-vpc'}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-igw'}

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.40.0.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-public-a'}

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.40.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-public-b'}

  AppSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.40.10.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-app-a'}

  AppSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.40.11.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-app-b'}

  DatabaseSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.40.20.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-db-a'}

  DatabaseSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.40.21.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-db-b'}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-public-rt'}

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRouteTable}
  PublicSubnetBRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRouteTable}

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties: {Domain: vpc}

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-nat'}

  AppRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-app-rt'}

  AppDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref AppRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  AppSubnetARouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref AppSubnetA, RouteTableId: !Ref AppRouteTable}
  AppSubnetBRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref AppSubnetB, RouteTableId: !Ref AppRouteTable}

  DatabaseRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-db-rt'}
  DatabaseSubnetARouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref DatabaseSubnetA, RouteTableId: !Ref DatabaseRouteTable}
  DatabaseSubnetBRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref DatabaseSubnetB, RouteTableId: !Ref DatabaseRouteTable}

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP entry point for CloudFront and health checks.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0}

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Backend instances accept traffic only from the ALB.
      VpcId: !Ref Vpc

  AppIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AppSecurityGroup
      IpProtocol: tcp
      FromPort: 5000
      ToPort: 5000
      SourceSecurityGroupId: !Ref AlbSecurityGroup

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS accepts MySQL only from backend instances.
      VpcId: !Ref Vpc

  DatabaseIngressFromApp:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DatabaseSecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !Ref AppSecurityGroup

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub '${EnvironmentName} RDS master credentials'
      GenerateSecretString:
        SecretStringTemplate: '{"username":"vdcmsadmin"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludePunctuation: true

  JwtSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub '${EnvironmentName} JWT signing secret'
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: true

  BootstrapAdminSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub '${EnvironmentName} first application Admin'
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${BootstrapAdminUsername}","email":"${BootstrapAdminEmail}"}'
        GenerateStringKey: password
        PasswordLength: 24
        ExcludePunctuation: true

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private database subnets in two Availability Zones.
      SubnetIds: [!Ref DatabaseSubnetA, !Ref DatabaseSubnetB]

  DatabaseParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: mysql8.0
      Description: Require encrypted client connections.
      Parameters:
        require_secure_transport: 'ON'

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBName: !Ref DatabaseName
      Engine: mysql
      EngineVersion: '8.0'
      DBInstanceClass: !Ref DatabaseInstanceClass
      AllocatedStorage: !Ref DatabaseAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Sub '{{resolve:secretsmanager:${DatabaseSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DatabaseSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      DBParameterGroupName: !Ref DatabaseParameterGroup
      VPCSecurityGroups: [!Ref DatabaseSecurityGroup]
      PubliclyAccessible: false
      MultiAZ: !If [UseMultiAZ, true, false]
      DeletionProtection: !If [ProtectDatabase, true, false]
      BackupRetentionPeriod: 7
      CopyTagsToSnapshot: true
      AutoMinorVersionUpgrade: true
      EnableCloudwatchLogsExports: [error, slowquery]
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-mysql'}

  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: {SSEAlgorithm: AES256}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration: {Status: Enabled}

  DataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: {SSEAlgorithm: AES256}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration: {Status: Enabled}
      LifecycleConfiguration:
        Rules:
          - Id: ExpireTemporaryTranscribeInputs
            Prefix: transcribe/input/
            Status: Enabled
            ExpirationInDays: 1
            NoncurrentVersionExpiration: {NoncurrentDays: 1}
          - Id: ExpireLegacyTranscribeInputs
            Prefix: transcribe_input/
            Status: Enabled
            ExpirationInDays: 1
            NoncurrentVersionExpiration: {NoncurrentDays: 1}
          - Id: ArchiveOldDocumentVersions
            Prefix: projects/
            Status: Enabled
            NoncurrentVersionTransitions:
              - {StorageClass: STANDARD_IA, TransitionInDays: 30}

  TranscribeDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  TranscribeQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 900
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TranscribeDeadLetterQueue.Arn
        maxReceiveCount: 3

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${EnvironmentName}-users'
      AutoVerifiedAttributes: [email]
      MfaConfiguration: OPTIONAL
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      UsernameConfiguration: {CaseSensitive: false}
      AccountRecoverySetting:
        RecoveryMechanisms:
          - {Name: verified_email, Priority: 1}
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - {Name: email, AttributeDataType: String, Mutable: true, Required: true}
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false
          StringAttributeConstraints: {MinLength: '3', MaxLength: '20'}

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: !Sub '${EnvironmentName}-web'
      GenerateSecret: false
      EnableTokenRevocation: true
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits: {AccessToken: hours, IdToken: hours, RefreshToken: days}
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      ReadAttributes: [email, 'custom:role']
      WriteAttributes: [email]

  CognitoAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: {GroupName: admin, Precedence: 1, UserPoolId: !Ref CognitoUserPool}
  CognitoManagerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: {GroupName: manager, Precedence: 2, UserPoolId: !Ref CognitoUserPool}
  CognitoEngineerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: {GroupName: engineer, Precedence: 3, UserPoolId: !Ref CognitoUserPool}

  TranscribeDataRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: transcribe.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadTranscribeInputs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject]
                Resource:
                  - !Sub '${DataBucket.Arn}/transcribe/input/*'
                  # Compatibility for recordings created before prefix sanitization was fixed.
                  - !Sub '${DataBucket.Arn}/transcribe_input/*'
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource: !GetAtt DataBucket.Arn

  BackendInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: VdcmsRuntimeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource: [!GetAtt DataBucket.Arn, !Sub '${DataBucket.Arn}/*']
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource: [!GetAtt FrontendBucket.Arn, !Sub '${FrontendBucket.Arn}/*']
              - Effect: Allow
                Action: [cloudfront:CreateInvalidation]
                Resource: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'
              - Effect: Allow
                Action: [sqs:ReceiveMessage, sqs:DeleteMessage, sqs:GetQueueAttributes, sqs:SendMessage, sqs:ChangeMessageVisibility]
                Resource: !GetAtt TranscribeQueue.Arn
              - Effect: Allow
                Action: [transcribe:StartTranscriptionJob, transcribe:GetTranscriptionJob, transcribe:ListTranscriptionJobs]
                Resource: '*'
              - Effect: Allow
                Action: [iam:PassRole]
                Resource: !GetAtt TranscribeDataRole.Arn
                Condition:
                  StringEquals: {iam:PassedToService: transcribe.amazonaws.com}
              - Effect: Allow
                Action: [ses:SendEmail, ses:SendRawEmail]
                Resource: '*'
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: [!Ref DatabaseSecret, !Ref JwtSecret, !Ref BootstrapAdminSecret]
              - Effect: Allow
                Action: [cognito-idp:AdminCreateUser, cognito-idp:AdminUpdateUserAttributes, cognito-idp:AdminAddUserToGroup, cognito-idp:ListUsers]
                Resource: !GetAtt CognitoUserPool.Arn

  BackendInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties: {Roles: [!Ref BackendInstanceRole]}

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups: [!Ref AlbSecurityGroup]
      Subnets: [!Ref PublicSubnetA, !Ref PublicSubnetB]
      LoadBalancerAttributes:
        - {Key: idle_timeout.timeout_seconds, Value: '120'}
        - {Key: routing.http.drop_invalid_header_fields.enabled, Value: 'true'}

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      Port: 5000
      Protocol: HTTP
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: {HttpCode: '200'}
      TargetGroupAttributes:
        - {Key: stickiness.enabled, Value: 'true'}
        - {Key: stickiness.type, Value: lb_cookie}
        - {Key: deregistration_delay.timeout_seconds, Value: '30'}

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - {Type: forward, TargetGroupArn: !Ref BackendTargetGroup}

  RegionalWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${EnvironmentName}-regional-waf'
      Scope: REGIONAL
      DefaultAction: {Allow: {}}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${EnvironmentName}-regional-waf'
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSCommonRules
          Priority: 0
          OverrideAction: {None: {}}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
              RuleActionOverrides:
                # File uploads are already constrained and validated by the API.
                # Counting this managed rule prevents valid multipart uploads from being blocked.
                - Name: SizeRestrictions_BODY
                  ActionToUse: {Count: {}}
                - Name: GenericLFI_BODY
                  ActionToUse: {Count: {}}
          VisibilityConfig: {CloudWatchMetricsEnabled: true, MetricName: common-rules, SampledRequestsEnabled: true}
        - Name: BlockGenericLfiBodyOutsideTranscribe
          Priority: 1
          Action: {Block: {}}
          Statement:
            AndStatement:
              Statements:
                - LabelMatchStatement:
                    Scope: LABEL
                    Key: 'awswaf:managed:aws:core-rule-set:GenericLFI_Body'
                - NotStatement:
                    Statement:
                      ByteMatchStatement:
                        SearchString: /api/aws/transcribe
                        FieldToMatch: {UriPath: {}}
                        PositionalConstraint: EXACTLY
                        TextTransformations: [{Priority: 0, Type: NONE}]
          VisibilityConfig: {CloudWatchMetricsEnabled: true, MetricName: generic-lfi-body-block, SampledRequestsEnabled: true}
        - Name: AWSKnownBadInputs
          Priority: 2
          OverrideAction: {None: {}}
          Statement:
            ManagedRuleGroupStatement: {VendorName: AWS, Name: AWSManagedRulesKnownBadInputsRuleSet}
          VisibilityConfig: {CloudWatchMetricsEnabled: true, MetricName: bad-inputs, SampledRequestsEnabled: true}
        - Name: PerIpRateLimit
          Priority: 3
          Action: {Block: {}}
          Statement:
            RateBasedStatement: {AggregateKeyType: IP, Limit: 2000}
          VisibilityConfig: {CloudWatchMetricsEnabled: true, MetricName: rate-limit, SampledRequestsEnabled: true}

  AlbWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties: {ResourceArn: !Ref ApplicationLoadBalancer, WebACLArn: !GetAtt RegionalWebAcl.Arn}

  CognitoWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties: {ResourceArn: !GetAtt CognitoUserPool.Arn, WebACLArn: !GetAtt RegionalWebAcl.Arn}

  ApiCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${EnvironmentName}-api-no-cache'
        DefaultTTL: 0
        MaxTTL: 0
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig: {CookieBehavior: none}
          HeadersConfig: {HeaderBehavior: none}
          QueryStringsConfig: {QueryStringBehavior: none}
          EnableAcceptEncodingBrotli: false
          EnableAcceptEncodingGzip: false

  ApiOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub '${EnvironmentName}-api-all-viewer'
        CookiesConfig: {CookieBehavior: all}
        HeadersConfig: {HeaderBehavior: allViewer}
        QueryStringsConfig: {QueryStringBehavior: all}

  FrontendCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${EnvironmentName}-frontend-cache'
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig: {CookieBehavior: none}
          HeadersConfig: {HeaderBehavior: none}
          QueryStringsConfig: {QueryStringBehavior: none}
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub '${EnvironmentName}-security-headers'
        SecurityHeadersConfig:
          ContentTypeOptions: {Override: true}
          FrameOptions: {FrameOption: DENY, Override: true}
          ReferrerPolicy: {ReferrerPolicy: strict-origin-when-cross-origin, Override: true}
          StrictTransportSecurity: {AccessControlMaxAgeSec: 31536000, IncludeSubdomains: true, Override: true, Preload: true}
          XSSProtection: {ModeBlock: true, Override: true, Protection: true}

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${EnvironmentName}-frontend-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${EnvironmentName}-spa-rewrite'
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite extensionless frontend routes to index.html.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (!uri.includes('.')) {
            request.uri = '/index.html';
          }
          return request;
        }

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: AlbListener
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        PriceClass: PriceClass_200
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendS3
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOriginAccessControl
            S3OriginConfig: {OriginAccessIdentity: ''}
          - Id: BackendAlb
            DomainName: !GetAtt ApplicationLoadBalancer.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          CachePolicyId: !Ref FrontendCachePolicy
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionARN
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: BackendAlb
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            CachePolicyId: !Ref ApiCachePolicy
            OriginRequestPolicyId: !Ref ApiOriginRequestPolicy
          - PathPattern: /socket.io/*
            TargetOriginId: BackendAlb
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: false
            CachePolicyId: !Ref ApiCachePolicy
            OriginRequestPolicyId: !Ref ApiOriginRequestPolicy
          - PathPattern: /uploads/*
            TargetOriginId: BackendAlb
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            CachePolicyId: !Ref ApiCachePolicy
            OriginRequestPolicyId: !Ref ApiOriginRequestPolicy
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal: {Service: cloudfront.amazonaws.com}
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'

  BackendLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile: {Arn: !GetAtt BackendInstanceProfile.Arn}
        SecurityGroupIds: [!Ref AppSecurityGroup]
        MetadataOptions: {HttpTokens: required, HttpEndpoint: enabled}
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs: {DeleteOnTermination: true, Encrypted: true, VolumeSize: 20, VolumeType: gp3}
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            dnf update -y
            dnf install -y git nodejs20 nodejs20-npm jq
            alternatives --set node /usr/bin/node-20
            node --version
            npm --version
            mkdir -p /opt/vdcms
            git clone --depth 1 --branch ${RepositoryBranch} ${RepositoryUrl} /opt/vdcms
            cd /opt/vdcms/BE
            npm ci --omit=dev
            cd /opt/vdcms/FE
            npm ci
            VITE_API_URL=https://${FrontendDistribution.DomainName}/api \
            VITE_SOCKET_URL=https://${FrontendDistribution.DomainName} \
            npm run build
            aws s3 sync /opt/vdcms/FE/dist s3://${FrontendBucket} --delete --region ${AWS::Region}
            aws cloudfront create-invalidation --distribution-id ${FrontendDistribution} --paths '/*'
            cd /opt/vdcms/BE
            curl -fsSL https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -o /opt/vdcms/global-bundle.pem
            DB_SECRET=$(aws secretsmanager get-secret-value --region ${AWS::Region} --secret-id ${DatabaseSecret} --query SecretString --output text)
            JWT_VALUE=$(aws secretsmanager get-secret-value --region ${AWS::Region} --secret-id ${JwtSecret} --query SecretString --output text)
            ADMIN_SECRET=$(aws secretsmanager get-secret-value --region ${AWS::Region} --secret-id ${BootstrapAdminSecret} --query SecretString --output text)
            DB_USER_VALUE=$(echo "$DB_SECRET" | jq -r .username)
            DB_PASSWORD_VALUE=$(echo "$DB_SECRET" | jq -r .password)
            ADMIN_USERNAME_VALUE=$(echo "$ADMIN_SECRET" | jq -r .username)
            ADMIN_EMAIL_VALUE=$(echo "$ADMIN_SECRET" | jq -r .email)
            ADMIN_PASSWORD_VALUE=$(echo "$ADMIN_SECRET" | jq -r .password)
            cat > /opt/vdcms/BE/.env <<EOF
            NODE_ENV=production
            PORT=5000
            TRUST_PROXY_HOPS=1
            DB_HOST=${Database.Endpoint.Address}
            DB_USER=$DB_USER_VALUE
            DB_PASSWORD=$DB_PASSWORD_VALUE
            DB_NAME=${DatabaseName}
            DB_SSL=true
            DB_SSL_CA_PATH=/opt/vdcms/global-bundle.pem
            JWT_SECRET=$JWT_VALUE
            APP_URL=https://${FrontendDistribution.DomainName}
            CORS_ORIGINS=https://${FrontendDistribution.DomainName}
            AWS_REGION=${AWS::Region}
            AWS_S3_BUCKET=${DataBucket}
            AWS_SES_FROM_EMAIL=${SesFromEmail}
            AWS_TRANSCRIBE_ENABLED=true
            AWS_TRANSCRIBE_ROLE_ARN=${TranscribeDataRole.Arn}
            AWS_TRANSCRIBE_QUEUE_URL=${TranscribeQueue}
            AWS_TRANSCRIBE_WORKER_TIMEOUT_SECONDS=840
            AWS_RDS_ENABLED=true
            AWS_CLOUDFRONT_DOMAIN=${FrontendDistribution.DomainName}
            AWS_COGNITO_USER_POOL_ID=${CognitoUserPool}
            AWS_COGNITO_CLIENT_ID=${CognitoUserPoolClient}
            BOOTSTRAP_ADMIN_USERNAME=$ADMIN_USERNAME_VALUE
            BOOTSTRAP_ADMIN_EMAIL=$ADMIN_EMAIL_VALUE
            BOOTSTRAP_ADMIN_PASSWORD=$ADMIN_PASSWORD_VALUE
            EOF
            chown -R ec2-user:ec2-user /opt/vdcms
            chmod 600 /opt/vdcms/BE/.env
            cat > /etc/systemd/system/vdcms-api.service <<EOF
            [Unit]
            Description=VDCMS API
            After=network-online.target
            [Service]
            Type=simple
            User=ec2-user
            WorkingDirectory=/opt/vdcms/BE
            EnvironmentFile=/opt/vdcms/BE/.env
            ExecStart=/usr/bin/node /opt/vdcms/BE/server.js
            Restart=always
            RestartSec=5
            [Install]
            WantedBy=multi-user.target
            EOF
            cat > /etc/systemd/system/vdcms-transcribe-worker.service <<EOF
            [Unit]
            Description=VDCMS SQS Transcribe Worker
            After=network-online.target vdcms-api.service
            [Service]
            Type=simple
            User=ec2-user
            WorkingDirectory=/opt/vdcms/BE
            EnvironmentFile=/opt/vdcms/BE/.env
            ExecStart=/usr/bin/node /opt/vdcms/BE/workers/transcriptionWorker.js
            Restart=always
            RestartSec=10
            [Install]
            WantedBy=multi-user.target
            EOF
            systemctl daemon-reload
            systemctl enable --now vdcms-api.service vdcms-transcribe-worker.service

  BackendAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: FrontendDistribution
    Properties:
      VPCZoneIdentifier: [!Ref AppSubnetA, !Ref AppSubnetB]
      MinSize: '1'
      DesiredCapacity: !Ref BackendDesiredCapacity
      MaxSize: '1'
      HealthCheckType: ELB
      HealthCheckGracePeriod: 600
      TargetGroupARNs: [!Ref BackendTargetGroup]
      LaunchTemplate:
        LaunchTemplateId: !Ref BackendLaunchTemplate
        Version: !GetAtt BackendLaunchTemplate.LatestVersionNumber
      Tags:
        - {Key: Name, Value: !Sub '${EnvironmentName}-backend', PropagateAtLaunch: true}

Outputs:
  ApplicationUrl:
    Value: !Sub 'https://${FrontendDistribution.DomainName}'
  CloudFrontDistributionId:
    Value: !Ref FrontendDistribution
  FrontendBucketName:
    Value: !Ref FrontendBucket
  DataBucketName:
    Value: !Ref DataBucket
  BackendLoadBalancerDns:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
  TranscribeQueueUrl:
    Value: !Ref TranscribeQueue
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
  CognitoClientId:
    Value: !Ref CognitoUserPoolClient
  BootstrapAdminSecretArn:
    Value: !Ref BootstrapAdminSecret
